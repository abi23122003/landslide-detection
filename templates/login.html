<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Login - LandSlideGuard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2363b3ed'/%3E%3Cstop offset='100%25' stop-color='%232c5282'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M32 14L48 46H16Z' fill='white' stroke='white' stroke-width='2' stroke-linejoin='round'/%3E%3Cpath d='M26 46l6-10 6 10' fill='url(%23g)' stroke='url(%23g)' stroke-width='1'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #2c5282;
            --primary-light: #3b6db5;
            --secondary: #63b3ed;
            --accent: #f6ad55;
            --dark: #1a202c;
            --light: #f7fafc;
            --error: #fc8181;
            --error-bg: rgba(254, 178, 178, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.18);
            --input-focus: rgba(99, 179, 237, 0.6);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
        }

        /* ── Light mode overrides ── */
        body.light-mode{
            background:linear-gradient(-45deg,#ffffff,#f0f7ff,#e8f1fd,#ffffff,#f5f9ff);
            background-size:400% 400%;animation:gradientShift 15s ease infinite;
        }
        body.light-mode #user-form{
            background:#ffffff;border-color:rgba(0,0,0,0.08);
            box-shadow:0 12px 40px rgba(0,0,0,0.1),0 2px 6px rgba(0,0,0,0.04);
        }
        body.light-mode .logo-section h1{color:#1a202c;}
        body.light-mode .logo-section p{color:#4a5568;}
        body.light-mode .input-group .form-input{
            background:#edf2f7;border-color:#b8c9da;color:#1a202c;
            box-shadow:inset 0 1px 3px rgba(0,0,0,0.04);
        }
        body.light-mode .input-group .form-input::placeholder{color:#a0aec0;}
        body.light-mode .input-group .form-input:focus{
            border-color:var(--primary);background:#fff;
            box-shadow:0 0 0 3px rgba(44,82,130,0.12);
        }
        body.light-mode .input-group .floating-label{color:#718096;}
        body.light-mode .input-group .form-input:focus + .floating-label,
        body.light-mode .input-group .form-input:not(:placeholder-shown) + .floating-label,
        body.light-mode .input-group .form-input.has-value + .floating-label{
            color:var(--primary);background:#ffffff;padding:0 6px;
        }
        body.light-mode .input-group .input-icon{color:#a0aec0;}
        body.light-mode .input-group .form-input:focus ~ .input-icon{color:var(--primary);}
        body.light-mode .password-toggle{color:#a0aec0;}
        body.light-mode .password-toggle:hover{color:#2d3748;}
        body.light-mode .checkbox-wrapper span{color:#4a5568;}
        body.light-mode .custom-checkbox{border-color:#cbd5e0;}
        body.light-mode .divider span{color:#a0aec0;}
        body.light-mode .divider::before,body.light-mode .divider::after{background:linear-gradient(90deg,transparent,#cbd5e0,transparent);}
        body.light-mode #switch-form{color:#4a5568;}
        body.light-mode .back-home{background:#ffffff;border-color:rgba(0,0,0,0.08);color:#2c5282;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
        body.light-mode .back-home:hover{background:#f7fafc;}
        body.light-mode .particle{background:rgba(44,82,130,0.06);}
        body.light-mode #error-msg{background:rgba(254,178,178,0.2);border-color:rgba(229,62,62,0.2);}
        body.light-mode #success-msg{background:rgba(72,187,120,0.1);border-color:rgba(72,187,120,0.25);color:#276749;}
        body.light-mode .forgot-link{color:var(--primary);}
        body.light-mode .logo-icon{box-shadow:0 8px 24px rgba(44,82,130,0.2);}
        body.light-mode .underline{background:linear-gradient(90deg,var(--primary),var(--secondary));}

        /* ── Theme toggle ── */
        .theme-toggle{
            position:fixed;top:24px;right:24px;z-index:200;
            width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
            background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.15);
            color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;
            transition:all .35s ease;box-shadow:0 4px 16px rgba(0,0,0,0.15);
        }
        .theme-toggle:hover{transform:scale(1.1);background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.35);box-shadow:0 0 18px rgba(99,179,237,0.3);}
        body.light-mode .theme-toggle{background:rgba(44,82,130,0.1);border-color:rgba(44,82,130,0.2);color:#2c5282;box-shadow:0 4px 16px rgba(0,0,0,0.06);}
        body.light-mode .theme-toggle:hover{background:rgba(44,82,130,0.18);}

        /* ── Animated gradient background ── */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #000000, #0a0a10, #060612, #000000, #080810);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Floating particles ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            animation: float linear infinite;
        }

        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ── Back to Home ── */
        .back-home {
            position: fixed;
            top: 24px;
            left: 24px;
            padding: 0.55rem 1.1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateX(-3px);
        }

        /* ── Glassmorphism card ── */
        .card-wrapper {
            position: relative;
            z-index: 1;
            animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        #user-form {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 2.8rem 2.5rem 2.2rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        #user-form.shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15%  { transform: translateX(-12px); }
            30%  { transform: translateX(10px); }
            45%  { transform: translateX(-8px); }
            60%  { transform: translateX(6px); }
            75%  { transform: translateX(-3px); }
        }

        /* ── Logo / Branding ── */
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(44, 82, 130, 0.4);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(44, 82, 130, 0.4); }
            50%      { box-shadow: 0 8px 36px rgba(99, 179, 237, 0.5); }
        }

        .logo-icon i {
            font-size: 1.7rem;
            color: white;
        }

        .logo-section h1 {
            color: var(--text-white);
            font-size: 1.55rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .logo-section h1 span {
            color: var(--accent);
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.35rem;
        }

        /* ── Floating label input groups ── */
        .input-group {
            position: relative;
            margin-bottom: 1.6rem;
        }

        .input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.3s;
            pointer-events: none;
            z-index: 2;
        }

        .input-group .form-input {
            width: 100%;
            padding: 0.95rem 2.8rem 0.95rem 2.8rem;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-white);
            transition: all 0.35s ease;
            outline: none;
        }

        .input-group .form-input::placeholder {
            color: transparent;
        }

        .input-group .floating-label {
            position: absolute;
            left: 2.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 400;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            padding: 0 4px;
        }

        /* Float up when focused or filled */
        .input-group .form-input:focus + .floating-label,
        .input-group .form-input:not(:placeholder-shown) + .floating-label,
        .input-group .form-input.has-value + .floating-label {
            top: 0;
            transform: translateY(-50%);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--secondary);
            background: #0d1b2e;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0 6px;
        }

        /* Handle browser autofill */
        .input-group .form-input:-webkit-autofill + .floating-label{
            top: 0;
            transform: translateY(-50%);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--secondary);
            background: #0d1b2e;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0 6px;
        }
        body.light-mode .input-group .form-input:-webkit-autofill + .floating-label{
            background:#ffffff;color:var(--primary);
        }

        /* Style autofilled inputs so they don't turn yellow */
        .input-group .form-input:-webkit-autofill,
        .input-group .form-input:-webkit-autofill:hover,
        .input-group .form-input:-webkit-autofill:focus{
            -webkit-text-fill-color: var(--text-white);
            -webkit-box-shadow: 0 0 0 40px rgba(13,27,46,1) inset;
            transition: background-color 5000s ease-in-out 0s;
        }
        body.light-mode .input-group .form-input:-webkit-autofill,
        body.light-mode .input-group .form-input:-webkit-autofill:hover,
        body.light-mode .input-group .form-input:-webkit-autofill:focus{
            -webkit-text-fill-color: #1a202c;
            -webkit-box-shadow: 0 0 0 40px #edf2f7 inset;
        }

        /* Animated underline on focus */
        .input-group .underline {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group .form-input:focus ~ .underline {
            left: 8%;
            width: 84%;
        }

        .input-group .form-input:focus {
            border-color: var(--input-focus);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.12);
        }

        .input-group .form-input:focus ~ .input-icon {
            color: var(--secondary);
        }

        /* ── Validation icons ── */
        .input-group .validation-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            font-size: 0.85rem;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .input-group .validation-icon.show {
            transform: translateY(-50%) scale(1);
        }

        .input-group .validation-icon.valid { color: #68d391; }
        .input-group .validation-icon.invalid { color: var(--error); }

        /* ── Password toggle ── */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.95rem;
            padding: 4px;
            transition: color 0.3s;
            z-index: 2;
        }

        .password-toggle:hover {
            color: var(--text-white);
        }

        /* ── Remember me checkbox ── */
        .checkbox-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.6rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--input-border);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .custom-checkbox i {
            font-size: 0.6rem;
            color: white;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }

        .checkbox-wrapper input[type="checkbox"]:checked + .custom-checkbox {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: var(--secondary);
        }

        .checkbox-wrapper input[type="checkbox"]:checked + .custom-checkbox i {
            opacity: 1;
            transform: scale(1);
        }

        .checkbox-wrapper span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .forgot-link {
            color: var(--secondary);
            font-size: 0.82rem;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--accent);
        }

        /* ── Error message ── */
        #error-msg {
            color: var(--error);
            margin-bottom: 1.2rem;
            font-size: 0.82rem;
            padding: 0.65rem 0.9rem;
            border-radius: 10px;
            background: var(--error-bg);
            border: 1px solid rgba(252, 129, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: errorSlide 0.4s ease;
        }

        @keyframes errorSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Gradient submit button ── */
        .submit-btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .submit-btn:hover::before {
            opacity: 1;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(99, 179, 237, 0.35);
        }

        .submit-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .submit-btn span,
        .submit-btn i {
            position: relative;
            z-index: 1;
        }

        .submit-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            position: relative;
            z-index: 1;
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .btn-icon { display: none; }
        .submit-btn.loading .spinner  { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            gap: 1rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* ── Switch form link ── */
        #switch-form {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        #switch-form a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        #switch-form a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        #switch-form a:hover::after {
            width: 100%;
        }

        #switch-form a:hover {
            color: var(--text-white);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            #user-form {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
            .logo-section h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
        <i class="fas fa-moon"></i>
    </button>

    <a href="/" class="back-home">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <div class="card-wrapper">
        <form id="user-form" action="/login" method="post" novalidate>
            <!-- Branding -->
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-mountain"></i>
                </div>
                <h1>LandSlide<span>Guard</span></h1>
                <p>Access your prediction dashboard</p>
            </div>

            <!-- Success message from registration -->
            {% if success %}
            <p id="success-msg" style="background:rgba(72,187,120,0.15);border:1px solid rgba(72,187,120,0.3);color:#68d391;padding:0.85rem 1.2rem;border-radius:12px;font-size:0.88rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:0.6rem;">
                <i class="fas fa-check-circle"></i>
                {{success}}
            </p>
            {% endif %}

            <!-- Error (shake + slide) -->
            {% if error %}
            <p id="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                {{error}}
            </p>
            {% endif %}

            <!-- Username -->
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input
                    id="user-username"
                    class="form-input"
                    type="text"
                    name="username"
                    required
                    placeholder="username"
                    autocomplete="username"
                >
                <label class="floating-label" for="user-username">Username</label>
                <span class="underline"></span>
                <i class="fas fa-check-circle validation-icon valid" id="username-valid"></i>
                <i class="fas fa-exclamation-circle validation-icon invalid" id="username-invalid"></i>
            </div>

            <!-- Password -->
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input
                    id="user-password"
                    class="form-input"
                    type="password"
                    name="password"
                    required
                    placeholder="password"
                    autocomplete="current-password"
                >
                <label class="floating-label" for="user-password">Password</label>
                <span class="underline"></span>
                <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <!-- Remember / Forgot -->
            <div class="checkbox-row">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="remember-me" name="remember-me">
                    <div class="custom-checkbox"><i class="fas fa-check"></i></div>
                    <span>Remember me</span>
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="form-submit">
                <i class="fas fa-sign-in-alt btn-icon"></i>
                <span class="btn-text">Login</span>
                <div class="spinner"></div>
            </button>

            <!-- Divider -->
            <div class="divider"><span>or</span></div>

            <!-- Register link -->
            <div id="switch-form">
                <p>Don't have an account? <a href="/register">Register</a></p>
            </div>
        </form>
    </div>

    <script>
        // ── Particles ──
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 12 + 8 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        })();

        // ── Password toggle ──
        const toggleBtn = document.getElementById('toggle-password');
        const pwdInput  = document.getElementById('user-password');
        toggleBtn.addEventListener('click', () => {
            const show = pwdInput.type === 'password';
            pwdInput.type = show ? 'text' : 'password';
            toggleBtn.querySelector('i').classList.toggle('fa-eye', !show);
            toggleBtn.querySelector('i').classList.toggle('fa-eye-slash', show);
        });

        // ── Live validation icons (username) ──
        const usernameInput  = document.getElementById('user-username');
        const validIcon   = document.getElementById('username-valid');
        const invalidIcon = document.getElementById('username-invalid');

        function checkUsername() {
            const val = usernameInput.value.trim();
            if (val.length === 0) {
                validIcon.classList.remove('show');
                invalidIcon.classList.remove('show');
            } else if (val.length >= 2) {
                validIcon.classList.add('show');
                invalidIcon.classList.remove('show');
            } else {
                validIcon.classList.remove('show');
                invalidIcon.classList.add('show');
            }
        }
        usernameInput.addEventListener('input', checkUsername);
        usernameInput.addEventListener('blur', checkUsername);

        // ── Shake on error ──
        {% if error %}
        document.getElementById('user-form').classList.add('shake');
        setTimeout(() => document.getElementById('user-form').classList.remove('shake'), 600);
        {% endif %}

        // ── Submit loading spinner ──
        document.getElementById('user-form').addEventListener('submit', function(e) {
            const btn = document.getElementById('form-submit');
            btn.classList.add('loading');
            btn.disabled = true;
        });

        // ── Theme toggle ──
        (function(){
            const btn=document.getElementById('theme-toggle');
            const icon=btn.querySelector('i');
            function applyTheme(mode){
                if(mode==='light'){document.body.classList.add('light-mode');icon.classList.remove('fa-moon');icon.classList.add('fa-sun');}
                else{document.body.classList.remove('light-mode');icon.classList.remove('fa-sun');icon.classList.add('fa-moon');}
            }
            applyTheme(localStorage.getItem('theme')||'dark');
            btn.addEventListener('click',()=>{
                const isLight=document.body.classList.toggle('light-mode');
                localStorage.setItem('theme',isLight?'light':'dark');
                icon.classList.toggle('fa-moon',!isLight);icon.classList.toggle('fa-sun',isLight);
            });
        })();

        // ── Autofill detection ── float labels up if browser auto-fills
        (function(){
            function markFilled(){
                document.querySelectorAll('.form-input').forEach(function(inp){
                    if(inp.value && inp.value.length > 0) inp.classList.add('has-value');
                    else inp.classList.remove('has-value');
                });
            }
            // Check immediately, after short delay (autofill timing), and on input
            markFilled();
            setTimeout(markFilled, 100);
            setTimeout(markFilled, 500);
            setTimeout(markFilled, 1500);
            document.querySelectorAll('.form-input').forEach(function(inp){
                inp.addEventListener('input', markFilled);
                inp.addEventListener('change', markFilled);
            });
        })();
    </script>
</body>
</html>
