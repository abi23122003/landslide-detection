services:
  - type: web
    name: landslide-detection
    runtime: python
    plan: free
    buildCommand: pip install -r requirements_production.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.5
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /
